---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: eso-secret-reader-sa
  namespace: redhat-ods-applications
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: eso-secret-reader-role
  namespace: maas-db
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "watch", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: eso-secret-reader-binding
  namespace: maas-db
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: eso-secret-reader-role
subjects:
- kind: ServiceAccount
  name: eso-secret-reader-sa
  namespace: redhat-ods-applications