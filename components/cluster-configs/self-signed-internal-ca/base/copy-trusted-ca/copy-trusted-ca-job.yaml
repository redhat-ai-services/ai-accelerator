apiVersion: batch/v1
kind: Job
metadata:
  name: job-copy-trusted-ca
  namespace: cert-manager
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  template:
    spec:
      containers:
        - name: minion
          image: registry.redhat.io/openshift4/ose-cli
          command:
            - /bin/bash
            - -c
            - /scripts/copy-trusted-ca.sh
          volumeMounts:
            - name: scripts
              mountPath: /scripts
      volumes:
        - name: scripts
          configMap:
            name: job-copy-trusted-ca
            defaultMode: 0755
      restartPolicy: Never
      serviceAccount: job-copy-trusted-ca
      serviceAccountName: job-copy-trusted-ca
  backoffLimit: 4
